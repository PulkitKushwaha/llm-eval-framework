name: RAG Pipeline Evaluation
 
on:
  pull_request:
    branches: [main]
    paths:
      - 'llm_eval/**'
      - 'examples/**'
      - 'tests/**'
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      dataset:
        description: 'Path to evaluation dataset'
        required: false
        default: 'examples/rag_pipeline_eval/dataset/test_questions.json'
 
jobs:
  evaluate:
    name: Run LLM Evaluation
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
 
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
 
      - name: Validate dataset
        run: |
          python -c "
          import json
          with open('examples/rag_pipeline_eval/dataset/test_questions.json') as f:
              data = json.load(f)
          assert isinstance(data, list), 'Dataset must be a list'
          assert len(data) > 0, 'Dataset must not be empty'
          required = ['question', 'ground_truth']
          for i, item in enumerate(data):
              for field in required:
                  assert field in item, f'Sample {i} missing field: {field}'
          print(f'Dataset valid: {len(data)} samples')
          "
 
      - name: Run unit tests
        run: |
          python -m pytest tests/ -v --tb=short
        continue-on-error: false
 
      - name: Run evaluation (mock mode)
        run: |
          python -c "
          import json
          import sys
 
          # Load dataset
          with open('examples/rag_pipeline_eval/dataset/test_questions.json') as f:
              questions = json.load(f)
 
          # Import framework
          from llm_eval import Evaluator
          from llm_eval.models import EvalSample
          from llm_eval.metrics import Faithfulness, AnswerRelevancy, ContextPrecision, ContextRecall
          from llm_eval.reporters import JSONReporter, MarkdownReporter
 
          # Build samples with mock answers for CI
          # In production: replace with actual RAG pipeline outputs
          samples = []
          for q in questions[:5]:  # Run on first 5 for CI speed
              samples.append(EvalSample(
                  question=q['question'],
                  answer='This is a test answer for CI validation purposes.',
                  contexts=['This is test context. ' * 10],
                  ground_truth=q.get('ground_truth', '')
              ))
 
          # Run evaluation with mock LLM (no API key needed)
          evaluator = Evaluator(
              metrics=[
                  Faithfulness(),
                  AnswerRelevancy(),
                  ContextPrecision(),
                  ContextRecall()
              ],
              metadata={'run': 'ci', 'mode': 'mock'},
              verbose=True
          )
 
          report = evaluator.evaluate(samples)
 
          # Save results
          import os
          os.makedirs('ci-results', exist_ok=True)
          JSONReporter().save(report, 'ci-results/eval_report.json')
          MarkdownReporter(include_per_sample=False).save(report, 'ci-results/eval_report.md')
 
          print(report.summary())
          print('Evaluation complete.')
          "
 
      - name: Upload evaluation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results-${{ github.sha }}
          path: ci-results/
          retention-days: 30
 
      - name: Post results as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'ci-results/eval_report.md';
 
            if (!fs.existsSync(reportPath)) {
              console.log('No report found, skipping PR comment');
              return;
            }
 
            const report = fs.readFileSync(reportPath, 'utf8');
            const comment = `## LLM Evaluation Results\n\n${report}\n\n*Generated by [llm-eval-framework](https://github.com/${{ github.repository }})*`;
 
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
